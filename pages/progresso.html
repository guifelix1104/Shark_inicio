<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progresso - Shark Camps</title>
    <!-- Estilos globais do projeto -->
    <link rel="stylesheet" href="../css/style.css">
    <!-- Estilos da navbar, cards e layout base -->
    <link rel="stylesheet" href="../css/dashboard.css">
    <!-- Estilos específicos das páginas do aluno -->
    <link rel="stylesheet" href="../css/aluno.css">
</head>
<body>

    <!-- Navbar com botão de voltar para a área do aluno -->
    <nav>
        <a href="dashboard.html" class="logo">
            <img src="../fotos projetos/logo shark.jpeg" alt="Logo">
            <span>SHARK CAMPS</span>
        </a>
        <ul>
            <li><a href="aluno.html">← Voltar</a></li>
        </ul>
        <button class="menu-toggle" onclick="toggleMenu()"><span></span><span></span><span></span></button>
        <div class="aluno">
            <a href="aluno.html" class="aluno-link">
                <div class="aluno-avatar">A</div>
                <span class="aluno-nome">Aluno</span>
            </a>
        </div>
    </nav>

    <!-- Container da página de progresso -->
    <div class="aluno-container">
        <h2>Progresso</h2>
        <h3>Sua jornada.</h3>
        <p>Acompanhe as aulas que você já concluiu.</p>

        <!-- Lista de aulas com status — "pendente" ou "concluido" -->
        <div class="progresso-lista">

            <!-- Aula 1 do Módulo 1 -->
            <div class="progresso-item">
                <span>Módulo 1 — Aula 1</span>
                <span class="tag pendente">Pendente</span>
            </div>

            <!-- Aula 2 do Módulo 1 -->
            <div class="progresso-item">
                <span>Módulo 1 — Aula 2</span>
                <span class="tag pendente">Pendente</span>
            </div>

            <!-- Aula 1 do Módulo 2 -->
            <div class="progresso-item">
                <span>Módulo 2 — Aula 1</span>
                <span class="tag pendente">Pendente</span>
            </div>

        </div>
    </div>
    <script src="../js/script.js"></script>
</body>
</html>
