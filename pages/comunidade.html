<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidade - Shark Camps</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/aluno.css">
</head>
<body>

    <!-- Navbar com botão de voltar para a área do aluno -->
    <nav>
        <a href="dashboard.html" class="logo">
            <img src="../fotos projetos/logo shark.jpeg" alt="Logo">
            <span>SHARK CAMPS</span>
        </a>
        <ul>
            <li><a href="aluno.html">← Voltar</a></li>
        </ul>
        <button class="menu-toggle" onclick="toggleMenu()"><span></span><span></span><span></span></button>
        <div class="aluno">
            <a href="aluno.html" class="aluno-link">
                <div class="aluno-avatar">A</div>
                <span class="aluno-nome">Aluno</span>
            </a>
        </div>
    </nav>

    <!-- Container da página de comunidade -->
    <div class="aluno-container">
        <h2>Comunidade</h2>
        <h3>Treine junto.</h3>
        <p>Poste seus treinos, peça dicas e interaja com outros alunos.</p>

        <!-- Caixa para criar um novo post -->
        <div class="post-box">
            <!-- Campo de texto onde o aluno escreve o post -->
            <textarea placeholder="Compartilhe seu treino ou peça uma dica..."></textarea>
            <!-- Botão para publicar o post (futuramente funcional) -->
            <button>Publicar</button>
        </div>

        <!-- Feed de posts da comunidade -->
        <div class="feed">

            <!-- Post de exemplo -->
            <div class="post">
                <!-- Cabeçalho do post com avatar, nome e tempo -->
                <div class="post-header">
                    <div class="aluno-avatar">A</div>
                    <span>Aluno • agora</span>
                </div>
                <!-- Conteúdo do post -->
                <p>Primeiro post da comunidade! 🦈</p>
            </div>

        </div>
    </div>
    <script src="../js/script.js"></script>
</body>
</html>
