<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Plano - Shark Camps</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="planos.css">
    <link rel="stylesheet" href="detalhes-plano.css">
</head>
<body>

    <nav>
        <a href="dashboard.html" class="logo">
            <img src="fotos projetos/logo shark.jpeg" alt="Logo">
            <span>SHARK CAMPS</span>
        </a>
        <ul>
            <li><a href="planos.html">← Voltar aos Planos</a></li>
        </ul>
        <button class="menu-toggle" onclick="toggleMenu()"><span></span><span></span><span></span></button>
        <div class="aluno">
            <a href="aluno.html" class="aluno-link">
                <div class="aluno-avatar">A</div>
                <span class="aluno-nome">Aluno</span>
            </a>
        </div>
    </nav>

    <div class="detalhes-container">

        <!-- Cabeçalho dinâmico do plano -->
        <div class="detalhes-header">
            <span class="plano-tag" id="plano-tag"></span>
            <h1 id="plano-titulo"></h1>
            <div class="plano-preco" id="plano-preco"></div>
        </div>

        <!-- Detalhes do plano -->
        <div class="detalhes-body">

            <div class="detalhes-info">
                <h3>O que está incluso</h3>
                <ul class="plano-lista" id="plano-lista"></ul>
            </div>

            <div class="detalhes-info">
                <h3>Informações gerais</h3>
                <ul class="plano-lista" id="plano-info"></ul>
            </div>

        </div>

        <!-- Contrato -->
        <div class="contrato-box">
            <h3>Termos e Condições</h3>
            <div class="contrato-texto" id="contrato-texto"></div>

            <label class="contrato-check">
                <input type="checkbox" id="aceite">
                Li e aceito os termos e condições do plano selecionado.
            </label>

            <button class="btn-confirmar" id="btn-confirmar" disabled onclick="confirmar()">
                CONFIRMAR E IR PARA PAGAMENTO
            </button>
        </div>

    </div>

    <script>
        // Lê o parâmetro ?plano= da URL para saber qual plano foi selecionado
        const params = new URLSearchParams(window.location.search);
        const plano = params.get("plano");

        // Objeto com os dados de cada plano — será usado para preencher a página dinamicamente
        const planos = {
            personal: {
                tag: "PERSONAL",
                titulo: "Treino Personal",
                preco: "R$ 350<span>/mês</span>",
                lista: [
                    "✔ Aulas 100% individuais",
                    "✔ Planejamento de treino personalizado",
                    "✔ Acompanhamento contínuo de evolução",
                    "✔ Horário flexível combinado com o professor",
                    "✔ Foco total no seu objetivo"
                ],
                info: [
                    "📍 Local a combinar com o professor",
                    "📅 Frequência semanal a definir",
                    "💳 Pagamento mensal",
                    "⚠️ Valor sujeito a alteração em breve"
                ],
                contrato: `Este contrato estabelece os termos entre o aluno e a Shark Camps para o plano Personal.\n\n
• O aluno se compromete a respeitar os horários agendados com o professor.\n
• Cancelamentos devem ser comunicados com no mínimo 24 horas de antecedência.\n
• O pagamento é mensal e deve ser realizado até o vencimento acordado.\n
• A Shark Camps reserva o direito de ajustar os valores com aviso prévio de 30 dias.\n
• O aluno declara estar ciente das condições físicas necessárias para a prática do boxe.`
            },
            ct: {
                tag: "CT AMIGOS DO JARDIM SILVEIRA",
                titulo: "Treino em Grupo — CT",
                preco: "R$ 100<span>/mês</span>",
                lista: [
                    "✔ Turmas regulares com horários fixos",
                    "✔ Treino técnico de boxe",
                    "✔ Condicionamento físico",
                    "✔ Ambiente de equipe e companheirismo",
                    "✔ Acesso à comunidade Shark Camps"
                ],
                info: [
                    "📍 CT Amigos do Jardim Silveira",
                    "📅 Aulas semanais conforme grade de horários",
                    "💳 Pagamento mensal — R$ 100",
                    "👥 Turmas com número limitado de alunos"
                ],
                contrato: `Este contrato estabelece os termos entre o aluno e a Shark Camps para o plano Treino em Grupo no CT Amigos do Jardim Silveira.\n\n
• O aluno se compromete a respeitar as regras do CT e do professor.\n
• A mensalidade deve ser paga até o vencimento acordado.\n
• Faltas não geram desconto ou reposição automática de aulas.\n
• O aluno declara estar ciente das condições físicas necessárias para a prática do boxe.\n
• A Shark Camps reserva o direito de ajustar os valores com aviso prévio de 30 dias.`
            },
            bluefit: {
                tag: "BLUEFIT",
                titulo: "Treino em Grupo — Bluefit",
                preco: "R$ 180<span>/mês</span>",
                lista: [
                    "✔ Turmas regulares com horários fixos",
                    "✔ Treino técnico de boxe",
                    "✔ Condicionamento físico",
                    "✔ Estrutura completa da Bluefit",
                    "✔ Acesso à comunidade Shark Camps"
                ],
                info: [
                    "📍 Unidade Bluefit",
                    "📅 Aulas semanais conforme grade de horários",
                    "💳 Pagamento mensal — R$ 180",
                    "👥 Turmas com número limitado de alunos"
                ],
                contrato: `Este contrato estabelece os termos entre o aluno e a Shark Camps para o plano Treino em Grupo na Bluefit.\n\n
• O aluno se compromete a respeitar as regras da unidade Bluefit e do professor.\n
• A mensalidade deve ser paga até o vencimento acordado.\n
• Faltas não geram desconto ou reposição automática de aulas.\n
• O aluno declara estar ciente das condições físicas necessárias para a prática do boxe.\n
• A Shark Camps reserva o direito de ajustar os valores com aviso prévio de 30 dias.`
            }
        };

        // Se o plano da URL não existir, usa o CT como padrão
        const dados = planos[plano] || planos.ct;

        // Preenche os elementos da página com os dados do plano selecionado
        document.getElementById("plano-tag").textContent = dados.tag;
        document.getElementById("plano-titulo").textContent = dados.titulo;
        document.getElementById("plano-preco").innerHTML = dados.preco;
        // Gera os itens da lista de benefícios dinamicamente
        document.getElementById("plano-lista").innerHTML = dados.lista.map(i => `<li>${i}</li>`).join("");
        // Gera os itens de informações gerais dinamicamente
        document.getElementById("plano-info").innerHTML = dados.info.map(i => `<li>${i}</li>`).join("");
        document.getElementById("contrato-texto").innerText = dados.contrato;

        // Habilita o botão de confirmar somente quando o checkbox for marcado
        document.getElementById("aceite").addEventListener("change", function() {
            document.getElementById("btn-confirmar").disabled = !this.checked;
        });

        // Redireciona para a página de pagamento passando o plano via URL
        function confirmar() {
            window.location.href = `pagamento.html?plano=${plano}`;
        }

        // Abre e fecha o menu mobile
        function toggleMenu() {
            document.querySelector('nav ul').classList.toggle('aberto');
        }
    </script>

</body>
</html>
